<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>S.G.I.R. — Design Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  /* ── DESIGN TOKENS ─────────────────────────────────────────── */
  :root {
    --primary:       #1E40AF;
    --primary-light: #3B82F6;
    --primary-50:    #EFF6FF;
    --accent:        #06B6D4;
    --accent-50:     #ECFEFF;
    --success:       #10B981;
    --success-50:    #ECFDF5;
    --warning:       #F59E0B;
    --warning-50:    #FFFBEB;
    --danger:        #EF4444;
    --danger-50:     #FEF2F2;
    --purple:        #8B5CF6;
    --purple-50:     #F5F3FF;
    --bg:            #F1F5F9;
    --surface:       #FFFFFF;
    --surface2:      #F8FAFC;
    --border:        #E2E8F0;
    --border-light:  #F1F5F9;
    --text-1:        #0F172A;
    --text-2:        #475569;
    --text-3:        #94A3B8;
    --sidebar-bg:    #0F172A;
    --sidebar-text:  #94A3B8;
    --sidebar-active:#FFFFFF;
    --radius-sm:     6px;
    --radius-md:     10px;
    --radius-lg:     16px;
    --radius-xl:     24px;
    --shadow-sm:     0 1px 3px rgba(0,0,0,.08);
    --shadow-md:     0 4px 12px rgba(0,0,0,.10);
    --shadow-lg:     0 8px 32px rgba(0,0,0,.12);
  }

  /* ── RESET & BASE ───────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 14px; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text-1);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP ROLE SWITCHER ──────────────────────────────────────── */
  .role-bar {
    background: var(--sidebar-bg);
    display: flex;
    align-items: center;
    padding: 0 24px;
    height: 48px;
    gap: 8px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .role-bar .brand {
    color: #fff;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: -.3px;
    margin-right: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .role-bar .brand span {
    background: var(--primary-light);
    width: 26px; height: 26px;
    border-radius: 7px;
    display: grid;
    place-items: center;
    font-size: 12px;
  }
  .role-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    transition: all .2s;
    color: var(--sidebar-text);
    background: transparent;
  }
  .role-btn:hover { color: #fff; background: rgba(255,255,255,.08); }
  .role-btn.active { color: #fff; }
  .role-btn.active[data-role="syndic"]  { background: var(--primary-light); }
  .role-btn.active[data-role="resident"]{ background: var(--success); }
  .role-btn.active[data-role="gardien"] { background: var(--warning); color: #0F172A; }
  .role-bar .spacer { flex: 1; }
  .user-chip {
    display: flex; align-items: center; gap: 8px;
    color: var(--sidebar-text); font-size: 12px;
  }
  .user-chip .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--primary); color: #fff;
    display: grid; place-items: center;
    font-size: 11px; font-weight: 700;
  }

  /* ── APP LAYOUT ─────────────────────────────────────────────── */
  .app {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ────────────────────────────────────────────────── */
  .sidebar {
    width: 220px;
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    padding: 16px 12px;
    gap: 2px;
    flex-shrink: 0;
    overflow-y: auto;
  }
  .sidebar .section-label {
    color: rgba(148,163,184,.5);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 12px 10px 6px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all .15s;
    color: var(--sidebar-text);
    font-size: 13px;
    font-weight: 500;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font-family: inherit;
  }
  .nav-item:hover { background: rgba(255,255,255,.06); color: #fff; }
  .nav-item.active { background: rgba(59,130,246,.15); color: #fff; }
  .nav-item .icon { width: 18px; height: 18px; opacity: .7; flex-shrink: 0; }
  .nav-item.active .icon { opacity: 1; }
  .nav-item .badge {
    margin-left: auto;
    background: var(--danger);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 20px;
  }

  /* ── MAIN CONTENT ───────────────────────────────────────────── */
  .main {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ────────────────────────────────────────────────── */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar .page-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-1);
  }
  .topbar .page-sub {
    font-size: 12px;
    color: var(--text-3);
    margin-left: 4px;
  }
  .topbar .spacer { flex: 1; }
  .topbar .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 7px 12px;
    font-size: 13px;
    color: var(--text-3);
    width: 220px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: var(--radius-md);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: all .15s;
  }
  .btn-primary { background: var(--primary-light); color: #fff; }
  .btn-primary:hover { background: var(--primary); }
  .btn-ghost {
    background: transparent;
    color: var(--text-2);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--bg); }
  .notif-btn {
    width: 36px; height: 36px;
    border-radius: var(--radius-md);
    background: var(--bg);
    border: 1px solid var(--border);
    display: grid; place-items: center;
    cursor: pointer;
    position: relative;
  }
  .notif-btn .dot {
    position: absolute;
    top: 6px; right: 6px;
    width: 8px; height: 8px;
    background: var(--danger);
    border-radius: 50%;
    border: 2px solid #fff;
  }

  /* ── SCREEN CONTAINERS ──────────────────────────────────────── */
  .screen {
    display: none;
    padding: 24px 28px;
    flex-direction: column;
    gap: 20px;
    flex: 1;
  }
  .screen.active { display: flex; }

  /* ── STAT CARDS ─────────────────────────────────────────────── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  .stat-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 20px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .stat-card .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .stat-card .icon-wrap {
    width: 40px; height: 40px;
    border-radius: var(--radius-md);
    display: grid; place-items: center;
  }
  .stat-card .trend {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
  }
  .trend-up   { background: var(--success-50); color: var(--success); }
  .trend-down { background: var(--danger-50);  color: var(--danger); }
  .trend-warn { background: var(--warning-50); color: #B45309; }
  .stat-card .value {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -.5px;
    color: var(--text-1);
  }
  .stat-card .label {
    font-size: 12px;
    color: var(--text-3);
    font-weight: 500;
  }

  /* ── SECTION HEADER ─────────────────────────────────────────── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .section-header h2 {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-1);
  }
  .see-all {
    font-size: 12px;
    font-weight: 600;
    color: var(--primary-light);
    cursor: pointer;
    border: none;
    background: none;
    font-family: inherit;
  }

  /* ── GRID 2-COL ─────────────────────────────────────────────── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .grid-3 { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }

  /* ── CARD ───────────────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .card-head {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border-light);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-head h3 {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-1);
  }
  .card-body { padding: 12px 0; }

  /* ── LIST ITEMS ─────────────────────────────────────────────── */
  .list-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    transition: background .15s;
    cursor: pointer;
  }
  .list-item:hover { background: var(--surface2); }
  .list-item .avatar-sq {
    width: 36px; height: 36px;
    border-radius: var(--radius-sm);
    display: grid; place-items: center;
    font-size: 11px; font-weight: 700;
    flex-shrink: 0;
    color: #fff;
  }
  .list-item .info { flex: 1; min-width: 0; }
  .list-item .info .name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-1);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .list-item .info .sub {
    font-size: 11px;
    color: var(--text-3);
    margin-top: 2px;
  }
  .list-item .meta {
    text-align: right;
    flex-shrink: 0;
  }
  .list-item .meta .amount {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-1);
  }
  .list-item .meta .date {
    font-size: 11px;
    color: var(--text-3);
    margin-top: 2px;
  }

  /* ── BADGES / TAGS ──────────────────────────────────────────── */
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .tag-blue    { background: var(--primary-50);  color: var(--primary); }
  .tag-green   { background: var(--success-50);  color: #047857; }
  .tag-amber   { background: var(--warning-50);  color: #92400E; }
  .tag-red     { background: var(--danger-50);   color: #991B1B; }
  .tag-purple  { background: var(--purple-50);   color: #5B21B6; }
  .tag-cyan    { background: var(--accent-50);   color: #0E7490; }
  .tag-slate   { background: #F1F5F9;             color: #475569; }

  /* ── PROGRESS BAR ───────────────────────────────────────────── */
  .progress-wrap { }
  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 20px;
  }
  .progress-row .label {
    width: 100px;
    font-size: 12px;
    color: var(--text-2);
    font-weight: 500;
    flex-shrink: 0;
  }
  .progress-bar {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar .fill {
    height: 100%;
    border-radius: 99px;
    background: var(--primary-light);
  }
  .progress-row .pct {
    width: 36px;
    text-align: right;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-1);
  }

  /* ── TASK ITEMS ─────────────────────────────────────────────── */
  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border-light);
    cursor: pointer;
    transition: background .15s;
  }
  .task-item:last-child { border-bottom: none; }
  .task-item:hover { background: var(--surface2); }
  .task-item .priority-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }
  .task-item .task-info { flex: 1; }
  .task-item .task-info .title {
    font-size: 13px; font-weight: 600; color: var(--text-1);
    margin-bottom: 4px;
  }
  .task-item .task-info .meta {
    display: flex; gap: 8px; align-items: center;
  }
  .task-item .right {
    display: flex; flex-direction: column;
    align-items: flex-end; gap: 6px;
  }
  .task-item .due {
    font-size: 11px; color: var(--text-3);
  }

  /* ── COMPLAINT ITEMS ────────────────────────────────────────── */
  .complaint-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border-light);
    cursor: pointer;
    transition: background .15s;
  }
  .complaint-item:last-child { border-bottom: none; }
  .complaint-item:hover { background: var(--surface2); }

  /* ── ANNOUNCEMENT CARD ──────────────────────────────────────── */
  .announce-item {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border-light);
    cursor: pointer;
    transition: background .15s;
  }
  .announce-item:last-child { border-bottom: none; }
  .announce-item:hover { background: var(--surface2); }
  .announce-item .announce-title {
    font-size: 13px; font-weight: 600; color: var(--text-1);
    margin-bottom: 4px;
  }
  .announce-item .announce-body {
    font-size: 12px; color: var(--text-2);
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .announce-item .announce-foot {
    display: flex; gap: 8px; align-items: center;
  }

  /* ── PAYMENT CARD ───────────────────────────────────────────── */
  .pay-card {
    background: linear-gradient(135deg, var(--primary) 0%, #2563EB 60%, var(--accent) 100%);
    border-radius: var(--radius-xl);
    padding: 24px;
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  .pay-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(255,255,255,.07);
  }
  .pay-card::after {
    content: '';
    position: absolute;
    bottom: -60px; right: 40px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,.05);
  }
  .pay-card .label { font-size: 12px; opacity: .75; margin-bottom: 6px; }
  .pay-card .amount { font-size: 32px; font-weight: 800; letter-spacing: -1px; }
  .pay-card .apt { font-size: 12px; opacity: .7; margin-top: 4px; }
  .pay-card .row {
    display: flex; gap: 16px; margin-top: 20px;
    position: relative; z-index: 1;
  }
  .pay-card .mini { flex: 1; }
  .pay-card .mini .mini-label { font-size: 10px; opacity: .7; }
  .pay-card .mini .mini-val { font-size: 14px; font-weight: 700; margin-top: 2px; }
  .pay-card .pay-btn {
    position: absolute; top: 20px; right: 20px;
    background: rgba(255,255,255,.2);
    border: 1px solid rgba(255,255,255,.3);
    color: #fff;
    padding: 8px 14px;
    border-radius: var(--radius-md);
    font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: inherit;
    backdrop-filter: blur(4px);
    z-index: 1;
  }

  /* ── CHART (CSS only) ───────────────────────────────────────── */
  .bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    height: 120px;
    padding: 0 20px 0;
  }
  .bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    height: 100%;
    justify-content: flex-end;
  }
  .bar-col .bar {
    width: 100%;
    border-radius: 4px 4px 0 0;
    background: var(--primary-50);
    transition: background .2s;
    cursor: pointer;
    min-height: 4px;
  }
  .bar-col .bar:hover,
  .bar-col.active .bar { background: var(--primary-light); }
  .bar-col .month {
    font-size: 10px;
    color: var(--text-3);
    font-weight: 500;
    white-space: nowrap;
  }
  .chart-labels {
    display: flex; justify-content: space-between;
    padding: 0 20px;
    margin-top: 4px;
  }
  .chart-labels span {
    font-size: 10px; color: var(--text-3);
  }

  /* ── DONUT ──────────────────────────────────────────────────── */
  .donut-wrap {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 16px 20px;
  }
  .donut {
    width: 100px; height: 100px;
    flex-shrink: 0;
  }
  .donut-legend { display: flex; flex-direction: column; gap: 8px; }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px;
  }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .legend-label { color: var(--text-2); }
  .legend-val { font-weight: 700; color: var(--text-1); margin-left: auto; }

  /* ── GARDIEN TASK CARD ──────────────────────────────────────── */
  .gtask-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    cursor: pointer;
    transition: box-shadow .15s, transform .15s;
    box-shadow: var(--shadow-sm);
  }
  .gtask-card:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }
  .gtask-card .gtask-head {
    display: flex; align-items: flex-start; gap: 10px;
  }
  .gtask-card .gtask-icon {
    width: 40px; height: 40px;
    border-radius: var(--radius-md);
    background: var(--primary-50);
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .gtask-card .gtask-title {
    font-size: 13px; font-weight: 700; color: var(--text-1);
  }
  .gtask-card .gtask-loc {
    font-size: 11px; color: var(--text-3); margin-top: 3px;
  }
  .gtask-card .gtask-status {
    margin-top: 4px;
  }
  .status-bar {
    display: flex; gap: 4px; margin-top: 8px;
  }
  .status-step {
    flex: 1;
    height: 4px;
    border-radius: 99px;
    background: var(--border);
  }
  .status-step.done { background: var(--success); }
  .status-step.active { background: var(--primary-light); }
  .gtask-footer {
    display: flex; align-items: center; justify-content: space-between;
  }

  /* ── PHOTO UPLOAD ZONE ──────────────────────────────────────── */
  .photo-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    color: var(--text-3);
  }
  .photo-zone:hover {
    border-color: var(--primary-light);
    background: var(--primary-50);
    color: var(--primary);
  }
  .photo-zone .upload-icon { font-size: 28px; margin-bottom: 8px; }
  .photo-zone .upload-text { font-size: 13px; font-weight: 500; }
  .photo-zone .upload-sub { font-size: 11px; margin-top: 4px; opacity: .7; }

  .photo-thumbs {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  }
  .photo-thumb {
    aspect-ratio: 1;
    border-radius: var(--radius-md);
    overflow: hidden;
    position: relative;
  }
  .photo-thumb img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .photo-thumb .thumb-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,.6);
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    padding: 4px 6px;
    text-align: center;
  }

  /* ── VOTE CARD ──────────────────────────────────────────────── */
  .vote-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    padding: 18px 20px;
    box-shadow: var(--shadow-sm);
  }
  .vote-card .vote-q { font-size: 14px; font-weight: 700; margin-bottom: 14px; }
  .vote-option {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;

function renderSidebar(role) {
  const items = ROLES[role].nav;
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = items.map(item => {
    if (item.sep) return `<div class="section-label">${item.sep}</div>`;
    const badge = item.badge ? `<span class="badge">${item.badge}</span>` : '';
    return `<button class="nav-item ${item.active ? 'active' : ''}" onclick="navTo('${item.id}', this)">${item.icon} ${item.label}${badge}</button>`;
  }).join('');
}

/* ═══════════════════════════════════════════════════════════════

═══════════════════════════════════════════════════════════════ */
function navTo(id, btn) {
  // Update nav
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (btn) btn.classList.add('active');
  // Render screen
  const container = document.getElementById('screens-container');
  const screenFn = SCREENS[id];
  if (screenFn) {
    container.innerHTML = `<div class="screen active" id="scr-${id}">${screenFn()}</div>`;

    const titles = {

function setRole(role) {

  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));

  const appLayout = document.getElementById('app-layout');
  const loginScreen = document.getElementById('screen-login');

  if (role === 'login') {
    appLayout.style.display = 'none';
    loginScreen.style.display = 'flex';
    loginScreen.classList.add('active');
    return;
  }

  loginScreen.style.display = 'none';
  loginScreen.classList.remove('active');
  appLayout.style.display = 'flex';
  currentRole = role;
  renderSidebar(role);

  const userData = ROLES[role].user;
  document.querySelector('.user-chip .avatar').textContent = userData.initials;
  document.getElementById('user-label').textContent = userData.label;

  const defaultScreens = { syndic: 'overview', resident: 'res-home', gardien: 'grd-home' };

  navTo(defaultScreens[role], document.querySelector('.nav-item'));
