<style>
        .glass-glow {
            box-shadow: inset 1px 1px 0px 0px rgba(255, 255, 255, 0.3);
        }

            box-shadow: 0 20px 40px rgba(43, 105, 84, 0.06);

<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
<!-- Header / Brand Anchor -->
<header class="w-full flex justify-center pt-12 pb-8">
<div class="flex flex-col items-center gap-2">
<span class="text-3xl font-black text-primary tracking-tighter font-headline">Darouna</span>
<div class="h-1 w-8 bg-gradient-to-r from-[#064E3B] to-[#10B981] rounded-full"></div>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-6 max-w-4xl mx-auto w-full">
<!-- Editorial Headline -->
<div class="text-center mb-16 space-y-3">
<h1 class="text-4xl md:text-5xl font-extrabold text-on-background font-headline tracking-tight">Welcome to Darouna</h1>
<p class="text-on-surface-variant font-medium text-lg">Please select your role to continue to your sanctuary</p>
</div>
<!-- Role Selection Bento-ish Grid -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full">
<!-- Syndic Card (Inactive) -->
<button class="group relative flex flex-col items-center justify-center p-8 bg-surface-container-lowest rounded-xl ambient-depth border border-outline-variant/10 hover:border-primary-container/30 transition-all duration-300 transform hover:-translate-y-1">
<div class="w-16 h-16 rounded-full bg-surface-container-low flex items-center justify-center mb-6 text-primary">
<span class="material-symbols-outlined text-3xl" data-icon="business_center">business_center</span>
</div>
<h3 class="text-xl font-bold font-headline text-on-surface">Syndic</h3>
<p class="text-sm text-on-surface-variant mt-2 text-center">Manage community affairs and finances</p>
</button>
<!-- Resident Card (Active / Selected) -->
<button class="relative flex flex-col items-center justify-center p-8 bg-gradient-to-br from-[#064E3B] to-[#10B981] rounded-xl shadow-2xl shadow-emerald-900/20 transform scale-105 z-10 glass-glow overflow-hidden">
<!-- Decorative background blur element -->
<div class="absolute -top-12 -right-12 w-32 h-32 bg-white/10 rounded-full blur-3xl"></div>
<div class="w-16 h-16 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center mb-6 text-white">
<span class="material-symbols-outlined text-3xl" data-icon="home" style="font-variation-settings: 'FILL' 1;">home</span>
</div>
<h3 class="text-xl font-bold font-headline text-white">Resident</h3>
<p class="text-sm text-white/80 mt-2 text-center">Access your home details and services</p>
<!-- Selected Badge -->
<div class="mt-6 px-4 py-1 bg-white/20 backdrop-blur-md rounded-full border border-white/30">
<span class="text-[10px] uppercase tracking-widest font-bold text-white">Current Selection</span>
</div>
</button>
<!-- Gardien Card (Inactive) -->
<button class="group relative flex flex-col items-center justify-center p-8 bg-surface-container-lowest rounded-xl ambient-depth border border-outline-variant/10 hover:border-primary-container/30 transition-all duration-300 transform hover:-translate-y-1">
<div class="w-16 h-16 rounded-full bg-surface-container-low flex items-center justify-center mb-6 text-primary">
<span class="material-symbols-outlined text-3xl" data-icon="security">security</span>
</div>
<h3 class="text-xl font-bold font-headline text-on-surface">Gardien</h3>
<p class="text-sm text-on-surface-variant mt-2 text-center">Monitor facility safety and access</p>
</button>
</div>
<!-- Login Action Section -->
<div class="mt-20 w-full max-w-sm">
<button class="w-full py-4 px-6 bg-gradient-to-r from-[#064E3B] to-[#10B981] text-white font-bold rounded-xl shadow-lg shadow-emerald-900/20 glass-glow hover:brightness-110 transition-all duration-300 flex items-center justify-center gap-3">
                Continue as Resident
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="flex items-center justify-center mt-8 gap-4">
<div class="h-[1px] flex-grow bg-outline-variant/20"></div>
<span class="text-xs uppercase tracking-widest font-bold text-on-surface-variant/50">Need Help?</span>
<div class="h-[1px] flex-grow bg-outline-variant/20"></div>
</div>
<p class="text-center mt-6 text-sm font-medium text-on-surface-variant">
                First time here? <a class="text-primary font-bold hover:underline" href="#">Contact your administrator</a>
</p>
</div>
</main>
<!-- Visual Polish: Background Organic Shapes -->
<div class="fixed top-0 right-0 -z-10 w-1/3 h-1/2 bg-primary-container/5 rounded-bl-full blur-[120px]"></div>
<div class="fixed bottom-0 left-0 -z-10 w-1/4 h-1/3 bg-tertiary-container/5 rounded-tr-full blur-[100px]"></div>
<footer class="w-full py-10 px-6 text-center">
<p class="text-[10px] uppercase tracking-[0.2em] font-bold text-on-surface-variant/40">© 2024 Darouna Digital Properties. Premium Living Refined.</p>
</footer>
