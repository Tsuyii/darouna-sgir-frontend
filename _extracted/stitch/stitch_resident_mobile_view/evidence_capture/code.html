<div class="relative group">

<h3 class="font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant">Before Work</h3>

<div class="h-64 w-full rounded-xl overflow-hidden bg-surface-container shadow-sm">

</div>
<button class="h-64 w-full rounded-xl border-2 border-dashed border-outline-variant bg-surface-container-low flex flex-col items-center justify-center gap-4 hover:bg-primary-fixed/10 transition-all group active:scale-95">
<div class="w-16 h-16 rounded-full bg-surface-container-lowest flex items-center justify-center shadow-sm group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-primary text-3xl">add_a_photo</span>
</div>
<div class="text-center">
<p class="font-label text-sm font-bold text-on-surface">Add After Photo</p>

</button>
